name: Build

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Cache ffmpeg LGPL binary
        id: cache-ffmpeg
        uses: actions/cache@v6
        with:
          path: ffmpeg_binaries/bin
          key: ffmpeg-lgpl-win64-latest

      - name: Download ffmpeg LGPL build
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-lgpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          $inner = Get-ChildItem ffmpeg_tmp -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Path ffmpeg_binaries/bin -Force
          Copy-Item "$($inner.FullName)/bin/ffmpeg.exe" ffmpeg_binaries/bin/
          Copy-Item "$($inner.FullName)/bin/ffprobe.exe" ffmpeg_binaries/bin/
          Remove-Item ffmpeg.zip, ffmpeg_tmp -Recurse -Force

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Add ffmpeg to PATH
        shell: pwsh
        run: echo "${{ github.workspace }}/ffmpeg_binaries/bin" >> $env:GITHUB_PATH

      - name: Integration tests
        run: python -m pytest tests/ -x --tb=short -q

      - name: Build CLI
        run: python -m PyInstaller Morphix_CLI.spec

      - name: Build UI
        run: python -m PyInstaller Morphix_UI.spec

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: morphix-windows-cli
          path: dist/Morphix_CLI.exe

      - name: Upload UI artifact
        uses: actions/upload-artifact@v7
        with:
          name: morphix-windows-ui
          path: dist/Morphix_UI.exe

      - name: Zip release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          Compress-Archive dist/Morphix_CLI.exe morphix-windows-cli.zip
          Compress-Archive dist/Morphix_UI.exe morphix-windows-ui.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            morphix-windows-cli.zip
            morphix-windows-ui.zip
