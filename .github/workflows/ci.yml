name: CI

on:
  push:
    branches: [main]
    paths: ["**.py", "requirements.txt", "ruff.toml"]
  pull_request:
    branches: [main]
    paths: ["**.py", "requirements.txt", "ruff.toml"]

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - run: pip install ruff

      - run: python -m ruff check .

  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - run: pip install -r requirements.txt

      - run: python -m pytest tests/ -x --tb=short -q -m "not integration"
